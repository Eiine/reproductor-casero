<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Server - Reproductor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app">

        <!-- NAV -->
        <div class="nav-bar">
            <button id="nav-player" class="nav-btn active">🎬 Reproductor</button>
            <button id="nav-upload" class="nav-btn">📤 Subir Videos</button>
        </div>

        <!-- LISTA -->
        <section id="list-container">
            <h1>Mis Videos</h1>
            <div id="current-dir"></div>
            <ul id="video-list">
                <p>Cargando biblioteca...</p>
            </ul>
        </section>
        
        <!-- PLAYER -->
        <section id="player-container" style="display:none;">
            <button id="back-btn">← Volver</button>
            <h2 id="now-playing"></h2>

            <video id="main-player" controls>
                <source src="" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </section>

    </main>

    <script src="main.js"></script>
</body>
</html>
